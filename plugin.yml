name: postgres
aliases: [pg]
version: 0.10.4
description: >
  Voodu plugin for postgres clusters. Single primary + N standbys
  via streaming replication, WAL archive (local default,
  S3/R2-overridable), auto-gen passwords, link/unlink for
  DATABASE_URL injection, expose/unexpose for internet-facing
  bind, manual failover/rejoin, psql shortcut, backup/restore
  with PITR. Heroku-style `vd pg:<cmd>` shortcut works alongside
  the canonical `vd postgres:<cmd>`.
homepage: https://github.com/thadeu/voodu-postgres

# All commands route to the single binary; voodu-postgres dispatches
# internally on os.Args[1]. No bin/<command> shims needed — drop the
# binary in bin/ and declare commands here.
entrypoint: bin/voodu-postgres

commands:
  - name: help
    help: >
      Plugin overview — what's available, sample HCL, common
      flows. Same content as `vd postgres -h`.

  - name: expand
    help: >
      (Internal.) Macro entrypoint invoked by the controller
      during apply. Emits the (asset, statefulset) pair plus
      auto-gen state actions (POSTGRES_PASSWORD,
      POSTGRES_REPLICATION_PASSWORD on first apply).

  - name: link
    help: >
      Wire DATABASE_URL into a consumer.
      Usage: vd postgres:link <provider-scope/name> <consumer-scope/name> [--reads]
      Emits DATABASE_URL (always) + DATABASE_READ_URL (--reads with
      replicas > 1, multi-host libpq URL spanning standbys).

  - name: unlink
    help: >
      Remove a previously-set DATABASE_URL.
      Usage: vd postgres:unlink <provider-scope/name> <consumer-scope/name>

  - name: new-password
    help: >
      Rotate the superuser password.
      Usage: vd postgres:new-password <postgres-scope/name> [--no-restart]
      Auto-refreshes DATABASE_URL on every linked consumer.

  - name: info
    help: >
      Show cluster topology + bucket vars.
      Usage: vd postgres:info <postgres-scope/name> [-o json]

  - name: expose
    help: >
      Publish postgres on 0.0.0.0:<port> (internet-facing).
      Usage: vd postgres:expose <postgres-scope/name>

  - name: unexpose
    help: >
      Return postgres to 127.0.0.1:<port> (loopback only).
      Usage: vd postgres:unexpose <postgres-scope/name>

  - name: promote
    help: >
      Promote a standby to primary. Plugin owns the SQL —
      runs lag check (pg_stat_replication) and pg_promote()
      internally; operator never types SQL. Refuses if any
      standby is behind unless --force.
      Usage: vd postgres:promote <postgres-scope/name> --replica <N> [--force] [--no-restart]

  - name: failover
    help: >
      Legacy alias for `promote`. Same handler; kept for
      backward compat with scripts using vd pg:failover.
      Usage: vd postgres:failover <postgres-scope/name> --replica <N> [--force] [--no-restart]

  - name: rejoin
    help: >
      Re-attach a divergent pod (typically the old primary
      post-failover) as a standby of the current primary. Runs
      pg_rewind via docker run --volumes-from, arms standby.signal,
      restarts the pod.
      Usage: vd postgres:rejoin <postgres-scope/name> --replica <N>

  - name: psql
    help: >
      Drop into psql against the cluster. No password needed —
      goes through the unix socket inside the container (trust
      auth). Supports interactive REPL, one-shot -c queries, and
      passthrough psql args via `--`.
      Usage: vd postgres:psql <postgres-scope/name> [--replica N] [-c "<sql>"] [-- <psql-args>]

  - name: backup
    help: >
      pg_basebackup snapshot to a tar file. Source defaults to
      the primary; --from-replica N to back up from a standby.
      Usage: vd postgres:backup <postgres-scope/name> --destination <path> [--from-replica N]

  - name: restore
    help: >
      Restore a cluster from a pg_basebackup tar. DESTRUCTIVE —
      wipes PGDATA. Optional --target-time for PITR replay.
      Requires --yes confirmation.
      Usage: vd postgres:restore <postgres-scope/name> --from <path> [--target-time "<ts>"] --yes

  - name: backups
    help: >
      List backups + status (running / complete / failed).
      Usage: vd pg:backups <postgres-scope/name> [-o json]

  - name: backups:capture
    help: >
      Spawn pg_dump in a sibling job. Detached by default
      (returns the new ID immediately); --follow streams logs +
      progress. Detached path emits apply_manifest + run_job
      dispatch actions; --follow stays docker-direct.
      Usage: vd pg:backups:capture <postgres-scope/name> [--from-replica N] [--follow]

  - name: backups:logs
    help: >
      docker logs on a backup container.
      Usage: vd pg:backups:logs <postgres-scope/name> <backup-id> [--follow]

  - name: backups:restore
    help: >
      pg_restore from a local backup id or http(s) URL into the
      live database. DESTRUCTIVE of database content (drops +
      recreates objects in the dump); non-destructive of cluster.
      Requires --yes confirmation.
      Usage: vd pg:backups:restore <postgres-scope/name> <id|url> --yes

  - name: backups:download
    help: >
      Copy a backup file from the pod to the host via docker cp.
      Usage: vd pg:backups:download <postgres-scope/name> <id> [--to <path>]

  - name: backups:delete
    help: >
      Remove a backup file (host-side os.Remove) plus emit
      delete_manifest to clean the residual job manifest. Requires
      --yes confirmation.
      Usage: vd pg:backups:delete <postgres-scope/name> <id> --yes

  - name: backups:schedule
    help: >
      Print a cronjob HCL template for paste-and-apply scheduling
      of backup captures. No state mutation — pure template helper.
      Usage: vd pg:backups:schedule <postgres-scope/name> [--at <cron>] [--from-replica N]

  - name: backups:cancel
    help: >
      Cancel running captures by emitting delete_manifest for each
      in-flight backup job. Voodu's JobHandler.remove SIGTERMs the
      container. Without an ID, cancels all running captures for
      the cluster.
      Usage: vd pg:backups:cancel <postgres-scope/name> [<backup-id>]
