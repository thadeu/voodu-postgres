name: postgres
version: 0.2.1
description: >
  Voodu macro plugin that expands postgres { ... } HCL blocks into
  statefulset manifests.
homepage: https://github.com/thadeu/voodu-postgres

commands:
  - name: expand
    help: >
      Macro entrypoint invoked by the controller during apply.
      Reads an expand request from stdin and emits a statefulset
      manifest envelope on stdout.
